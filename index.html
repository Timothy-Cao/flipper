<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="description" content="A neon marble-race yes/no oracle. Ask a question; YES and NO race down a chaotic obstacle course; first to the finish line answers." />
<meta name="theme-color" content="#03040a" />
<meta name="color-scheme" content="dark" />

<meta property="og:title" content="FLIPPER — neon marble-race oracle" />
<meta property="og:description" content="Ask a yes/no question. Two marbles race down a chaotic obstacle course. First to the finish line answers." />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary_large_image" />

<title>FLIPPER</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main id="stage">
    <canvas id="world" width="700" height="980" role="img" aria-label="Neon marble race between yes and no"></canvas>

    <div id="util" class="util">
      <button id="mute" class="icon-btn" type="button" aria-label="Mute audio" aria-pressed="false" title="Mute (M)">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <path id="muteOn" d="M4 9v6h4l5 4V5L8 9H4z" fill="currentColor"/>
          <path id="muteWv" d="M16 8.5a4.5 4.5 0 0 1 0 7M19 6a8 8 0 0 1 0 12" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linecap="round"/>
          <path id="muteX"  d="M16.5 9.5l5 5M21.5 9.5l-5 5" stroke="currentColor" stroke-width="1.8" fill="none" stroke-linecap="round" style="display:none"/>
        </svg>
      </button>
    </div>

    <!-- HUD during a race -->
    <div id="hud" class="hud hidden">
      <div id="banner" class="hud-question"></div>
      <div id="scoreboard" class="scoreboard">
        <span class="chip chip-yes" data-label="YES"><span class="dot"></span>YES</span>
        <span class="chip chip-no"  data-label="NO"><span class="dot"></span>NO</span>
      </div>
    </div>

    <!-- Menu (visible before the race) -->
    <section id="menu" class="overlay overlay-dim" aria-labelledby="title">
      <div class="panel">
        <h1 id="title" class="neon">FLIPPER</h1>
        <p class="sub">Ask the universe.</p>
        <label class="sr-only" for="question">A yes or no question</label>
        <input id="question" type="text" placeholder="Ask a yes / no question" maxlength="80" autocomplete="off" autocapitalize="sentences" spellcheck="false" enterkeyhint="go" />
        <button id="flip" class="big-btn" type="button">DROP</button>
        <p class="hint hint-quiet"><kbd>Space</kbd> to drop</p>
      </div>
    </section>

    <!-- Result screen -->
    <section id="result" class="overlay overlay-dim hidden" aria-live="polite" aria-label="Race result">
      <div class="panel panel-result">
        <div id="verdict" class="verdict" aria-live="assertive"></div>
        <p id="resultMeta" class="hint result-meta"></p>
        <button id="again" class="btn" type="button">Drop again</button>
      </div>
    </section>

    <p id="fatal" class="fatal hidden" role="alert"></p>
  </main>

  <script src="app.js"></script>
</body>
</html>
